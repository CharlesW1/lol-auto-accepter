name: Release

on:
  push:
    branches:
      - main

jobs:
  release:
    runs-on: ubuntu-latest
    concurrency: release
    permissions:
      id-token: write
      contents: write
    outputs:
      released: ${{ steps.semantic.outputs.released }}
      version: ${{ steps.semantic.outputs.version }}
      tag: ${{ steps.semantic.outputs.tag }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Python Semantic Release
        id: semantic
        uses: python-semantic-release/python-semantic-release@v9.16.1
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}

  build:
    needs: release
    if: needs.release.outputs.released == 'true'
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.release.outputs.tag }}
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller
      - name: Build full auto-queue executable
        run: |
          if (!(Test-Path "clicker.log")) {
            New-Item -ItemType File -Path "clicker.log" -Force
          }
          pyinstaller --noconfirm --clean --onefile --name "Image-Clicker-auto-queue" --paths src --add-data "images;images" --add-data "clicker.log;." "Image-Clicker(v1.2).py"
      - name: Stage auto-accept-only image subset
        run: |
          New-Item -ItemType Directory -Force -Path "images_accept_only" | Out-Null
          Copy-Item -Recurse -Force "images/accept" "images_accept_only/accept"
      - name: Build auto-accept-only executable
        run: |
          pyinstaller --noconfirm --clean --onefile --name "Image-Clicker-auto-accept" --paths src --add-data "images_accept_only;images" --add-data "clicker.log;." "Image-Clicker(v1.2).py"
      - name: Upload Release Assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.release.outputs.tag }}
          files: |
            dist/Image-Clicker-auto-queue.exe
            dist/Image-Clicker-auto-accept.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
